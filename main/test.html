<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pixel Globe</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #2f67ff; /* เปลี่ยนสีพื้นหลังได้ */
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    canvas { display:block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: true });

  // วาดแบบ low-res แล้วค่อยขยาย เพื่อให้ฟีล “bitmap/pixel”
  const low = document.createElement("canvas");
  const lctx = low.getContext("2d", { alpha: true });

  // ปรับได้
  const BG = "#2f67ff"; // สีพื้นหลัง
  const SPEED = 0.55;   // ความเร็วหมุน (มากขึ้น = หมุนเร็วขึ้น)
  const GLOBE_SCALE = 0.62; // ขนาดลูกโลกเทียบกับความสูงจอ
  const LOW_RES = 160;  // ยิ่งต่ำยิ่ง pixel ใหญ่ (เช่น 120, 140, 160)
  const TWINKLE = 0.08; // ความกระพริบ/สั่นของพิกเซลเล็กน้อย

  // โทนเทา-ขาว (แก้พาเลตได้)
  const PALETTE = ["#1f2937", "#6b7280", "#d1d5db", "#ffffff"]; // dark -> white

  // Bayer dithering 4x4 (ให้ดูเป็นพิกเซลสวยขึ้น)
  const BAYER4 = [
    0,  8,  2, 10,
    12, 4, 14,  6,
    3, 11,  1,  9,
    15, 7, 13,  5
  ];

  function resize() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width  = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    low.width = LOW_RES;
    low.height = LOW_RES;
    lctx.imageSmoothingEnabled = false;

    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener("resize", resize);
  resize();

  // --------- “แผนที่ทวีป” แบบ procedural (ดูคล้ายโลก ไม่ต้องใช้รูปจริง) ---------
  function fract(x){ return x - Math.floor(x); }
  function hash2(x, y){
    // deterministic pseudo random 0..1
    return fract(Math.sin(x*127.1 + y*311.7) * 43758.5453);
  }
  function smoothstep(a,b,t){
    t = Math.max(0, Math.min(1, (t-a)/(b-a)));
    return t*t*(3-2*t);
  }
  function lerp(a,b,t){ return a + (b-a)*t; }

  function valueNoise(x, y){
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;

    const a = hash2(xi, yi);
    const b = hash2(xi+1, yi);
    const c = hash2(xi, yi+1);
    const d = hash2(xi+1, yi+1);

    const u = smoothstep(0,1,xf);
    const v = smoothstep(0,1,yf);

    return lerp(lerp(a,b,u), lerp(c,d,u), v);
  }
  function fbm(x,y){
    let n = 0, amp = 0.55, freq = 1.0;
    for (let i=0;i<4;i++){
      n += amp * valueNoise(x*freq, y*freq);
      freq *= 2.0;
      amp *= 0.5;
    }
    return n;
  }
  function blob(u,v,uc,vc,rx,ry){
    const dx = Math.min(Math.abs(u-uc), 1-Math.abs(u-uc)); // wrap u
    const dy = v - vc;
    const q = (dx*dx)/(rx*rx) + (dy*dy)/(ry*ry);
    return Math.exp(-q*2.2);
  }
  function landMask(u,v){
    // u,v in [0,1]
    let m = 0;
    // ก้อนทวีปหลัก ๆ (approx)
    m += blob(u,v,0.23,0.52,0.13,0.18); // N. America
    m += blob(u,v,0.28,0.70,0.09,0.15); // S. America
    m += blob(u,v,0.55,0.50,0.12,0.20); // Europe/Africa
    m += blob(u,v,0.70,0.50,0.18,0.20); // Asia
    m += blob(u,v,0.83,0.76,0.09,0.08); // Australia

    // เติม noise ให้ขอบดู organic
    const n = fbm(u*6.0, v*4.0);
    m += (n - 0.5) * 0.9;

    // ลด land บริเวณขั้วโลก (ให้ดูคล้ายจริงขึ้น)
    const pole = Math.abs(v - 0.5) * 2.0; // 0 กลาง, 1 ขอบ
    m -= smoothstep(0.75, 1.0, pole) * 0.25;

    return m;
  }

  function pickColorIndex(val01, x, y){
    // Bayer dithering ให้ไล่ระดับดูเป็นพิกเซล
    const d = (BAYER4[(x & 3) + ((y & 3) << 2)] / 16) - 0.5; // -0.5..0.5
    const v = Math.max(0, Math.min(1, val01 + d * 0.10));
    if (v < 0.28) return 0;
    if (v < 0.52) return 1;
    if (v < 0.78) return 2;
    return 3;
  }

  function draw(tms){
    const w = innerWidth, h = innerHeight;
    ctx.fillStyle = BG;
    ctx.fillRect(0,0,w,h);

    // วาดลง low-res
    lctx.clearRect(0,0,LOW_RES,LOW_RES);

    const N = LOW_RES;
    const cx = (N/2), cy = (N/2);
    const r = (N/2) * 0.78;

    const t = tms * 0.001;
    const rot = t * SPEED; // rotation angle

    for (let py=0; py<N; py++){
      for (let px=0; px<N; px++){
        const nx = (px + 0.5 - cx) / r;
        const ny = (py + 0.5 - cy) / r;
        const rr = nx*nx + ny*ny;
        if (rr > 1) continue;

        // front hemisphere depth
        const z = Math.sqrt(1 - rr); // 0..1

        // map to lat/lon (หมุนด้วยการเลื่อน longitude)
        const lat = Math.asin(ny);                 // -pi/2..pi/2
        const lon = Math.atan2(z, nx) + rot;       // -pi..pi + rot
        let u = (lon / (Math.PI*2)) + 0.5;         // 0..1
        u = u - Math.floor(u);
        const v = 0.5 - lat / Math.PI;             // 0..1

        // “ขยับพิกเซล” เบา ๆ ให้ดูมีชีวิต (optional)
        const shimmer = Math.sin((ny*6.0 + t*2.6) * Math.PI) * 0.006;
        const u2 = (u + shimmer + 1) % 1;

        const land = landMask(u2, v) > 0.58;

        // lighting (ให้มีเงา/ไฮไลต์บนทรงกลม)
        let light = 0.25 + 0.75 * z;  // z สูง = สว่าง
        light += land ? 0.07 : -0.10; // land สว่างกว่า sea เล็กน้อย

        // rim highlight (ขอบโลก)
        const rim = smoothstep(0.06, 0.16, z);
        light = lerp(0.92, light, rim);

        // twinkle noise (ทำให้พิกเซลเปลี่ยนสี/กระพริบเล็กน้อย)
        const tw = (hash2(px + Math.floor(t*10), py) - 0.5) * TWINKLE;
        light = Math.max(0, Math.min(1, light + tw));

        const idx = pickColorIndex(light, px, py);
        lctx.fillStyle = PALETTE[idx];
        lctx.fillRect(px, py, 1, 1);
      }
    }

    // เอา low-res มาขยายวางกลางจอ
    const globePx = Math.min(w,h) * GLOBE_SCALE;
    const dx = (w - globePx) / 2;
    const dy = (h - globePx) / 2;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(low, dx, dy, globePx, globePx);

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
