<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>minting...</title>
    <link rel="icon" type="image/png" href="../logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --env-bg:     #ede3d4;
        --env-border: #c8b49a;
        --env-shade:  #d4c4ae;
        --paper-bg:   #fefcf5;
        --ink:        #1e1710;
        --ink-muted:  #7a6855;
        --accent:     #8c6e4b;
        --btn-bg:     #1e1710;
        --btn-text:   #fefcf5;
        --stage-bg:   #ddd0be;
        --rule-line:  rgba(170,145,115,0.22);
        --margin-line: rgba(195,80,60,0.28);
        --seal-color: #7a2c0e;
      }

      body {
        min-height: 100vh;
        background: var(--stage-bg);
        font-family: 'Lora', Georgia, serif;
        overflow: hidden;
      }

      /* ─── Envelope stage ──────────────────────────────────────── */

      #envStage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: var(--stage-bg);
        z-index: 50;
        transition: opacity 0.6s ease 0.15s;
      }
      #envStage.hide { opacity: 0; pointer-events: none; }

      #envWrap {
        position: relative;
        width: 310px;
        height: 210px;
        perspective: 700px;
        perspective-origin: 50% -10%;
      }

      /* Envelope body — airmail stripe border via layered backgrounds */
      #envBody {
        position: absolute;
        inset: 0;
        border-radius: 4px;
        overflow: hidden;
        box-shadow:
          0 16px 48px rgba(0,0,0,0.18),
          0  4px 12px rgba(0,0,0,0.10);
        background:
          /* cream center inset 7px from all edges */
          linear-gradient(var(--env-bg), var(--env-bg))
            7px 7px / calc(100% - 14px) calc(100% - 14px) no-repeat,
          /* airmail red/blue diagonal stripes */
          repeating-linear-gradient(
            -45deg,
            #c0392b  0px  4px,
            #ffffff  4px  7px,
            #1a5fb4  7px 11px,
            #ffffff 11px 14px
          );
      }

      /* fold lines — bottom V */
      #envBody::before,
      #envBody::after {
        content: '';
        position: absolute;
        bottom: 0;
        height: 1.5px;
        background: rgba(140,110,75,0.45);
        width: 56%;
      }
      #envBody::before {
        left: 0;
        transform-origin: bottom left;
        transform: rotate(-36deg);
      }
      #envBody::after {
        right: 0;
        transform-origin: bottom right;
        transform: rotate(36deg);
      }

      /* letter peeking from inside */
      #letterPeek {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) translateY(100%);
        width: 76%;
        height: 168px;
        background: var(--paper-bg);
        border: 1px solid #ddd4c0;
        border-bottom: none;
        border-radius: 2px 2px 0 0;
        overflow: hidden;
        transition: transform 0.75s cubic-bezier(0.34, 1.35, 0.64, 1) 0s;
        /* ruled lines on peek */
        background-image:
          linear-gradient(var(--paper-bg), var(--paper-bg)) 0 0 / 100% 100%,
          repeating-linear-gradient(
            transparent 0 26px,
            var(--rule-line) 26px 27px
          );
        background-blend-mode: normal;
      }
      #letterPeek.reveal {
        transform: translateX(-50%) translateY(-26px);
      }

      /* ruled lines on peek (separate from bg trick) */
      #letterPeek {
        background:
          repeating-linear-gradient(
            transparent 0 26px,
            var(--rule-line) 26px 27px
          ),
          var(--paper-bg);
      }

      /* decorative content inside the peek */
      .peek-content {
        padding: 14px 18px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .peek-name {
        width: 55%;
        height: 10px;
        background: rgba(140,110,75,0.3);
        border-radius: 2px;
        margin-bottom: 4px;
      }
      .peek-text {
        width: 90%;
        height: 7px;
        background: rgba(140,110,75,0.15);
        border-radius: 2px;
      }
      .peek-text:nth-child(3) { width: 75%; }
      .peek-text:nth-child(4) { width: 85%; }
      .peek-air {
        margin-top: 6px;
        font-size: 8px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #1a5fb4;
        font-family: 'Lora', serif;
        font-weight: 600;
        border: 1px solid #1a5fb4;
        display: inline-block;
        padding: 1px 5px;
        border-radius: 2px;
        width: fit-content;
        opacity: 0.7;
      }

      /* envelope flap */
      #envFlap {
        position: absolute;
        top: -1px;
        left: -1px;
        width: calc(100% + 2px);
        height: 130px;
        z-index: 10;
        transform-origin: top center;
        transform-style: preserve-3d;
        transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1) 0s;
        pointer-events: none;
      }
      #envFlap.open { transform: rotateX(-162deg); }

      #envFlapFront {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        /* front of flap — slightly darker cream with airmail border */
        background:
          linear-gradient(var(--env-shade), var(--env-shade))
            7px 7px / calc(100% - 14px) calc(100% - 7px) no-repeat,
          repeating-linear-gradient(
            -45deg,
            #c0392b 0px 4px, #fff 4px 7px,
            #1a5fb4 7px 11px, #fff 11px 14px
          );
        clip-path: polygon(0 0, 100% 0, 50% 80%);
      }
      #envFlapFront::after {
        content: '';
        position: absolute;
        inset: 0;
        clip-path: polygon(0 0, 100% 0, 50% 80%);
        background: linear-gradient(
          160deg,
          rgba(255,255,255,0.12) 0%,
          transparent 60%
        );
      }

      #envFlapBack {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(color-mix(in srgb, var(--env-bg) 75%, #a0784a 25%), color-mix(in srgb, var(--env-bg) 75%, #a0784a 25%))
            7px 7px / calc(100% - 14px) calc(100% - 7px) no-repeat,
          repeating-linear-gradient(
            -45deg,
            #c0392b 0px 4px, #fff 4px 7px,
            #1a5fb4 7px 11px, #fff 11px 14px
          );
        clip-path: polygon(0 0, 100% 0, 50% 80%);
        transform: rotateX(180deg);
        backface-visibility: hidden;
      }

      /* ─── Letter page ─────────────────────────────────────────── */

      #letterPage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: start center;
        background: var(--stage-bg);
        padding: 28px 16px 44px;
        overflow-y: auto;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.65s ease;
      }
      #letterPage.show {
        opacity: 1;
        pointer-events: auto;
      }

      /* the letter card */
      #letterCard {
        width: 100%;
        max-width: 370px;
        border-radius: 3px;
        box-shadow:
          0 20px 60px rgba(0,0,0,0.14),
          0  4px 12px rgba(0,0,0,0.08),
          inset 0 0 0 1px rgba(150,120,80,0.18);
        transform: translateY(24px);
        transition: transform 0.7s cubic-bezier(0.34, 1.2, 0.64, 1) 0.1s;
        overflow: hidden;
        /* paper with ruled lines + left margin */
        background:
          /* left margin line */
          linear-gradient(to right, transparent 38px, var(--margin-line) 38px, var(--margin-line) 40px, transparent 40px),
          /* ruled lines */
          repeating-linear-gradient(
            transparent 0 27px,
            var(--rule-line) 27px 28px
          ),
          /* base paper colour */
          var(--paper-bg);
      }
      #letterPage.show #letterCard { transform: translateY(0); }

      /* ── Card sections ── */

      .card-header {
        padding: 18px 20px 14px;
        border-bottom: 1px solid rgba(150,120,80,0.15);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      /* address block (left) */
      .addr-block {
        flex: 1;
        padding-top: 2px;
      }
      .addr-label {
        font-size: 9px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--ink-muted);
        opacity: 0.7;
        margin-bottom: 4px;
        font-family: 'Lora', serif;
      }
      .addr-name {
        font-family: 'Playfair Display', serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 2px;
      }
      .addr-bio {
        font-size: 11px;
        color: var(--ink-muted);
        line-height: 1.45;
      }
      .addr-date {
        margin-top: 5px;
        font-family: 'Caveat', cursive;
        font-size: 13px;
        color: var(--ink-muted);
      }

      /* stamp + postmark (right) */
      .stamp-block {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
        position: relative;
      }

      /* perforated stamp */
      .stamp {
        width: 50px;
        height: 60px;
        position: relative;
        background: white;
        box-shadow: 0 1px 4px rgba(0,0,0,0.18);
        /* scalloped / perforated edges via radial gradients */
        -webkit-mask-image:
          radial-gradient(circle at 50% 0%,   transparent 4px, black 4px),
          radial-gradient(circle at 50% 100%, transparent 4px, black 4px),
          radial-gradient(circle at 0%   50%, transparent 4px, black 4px),
          radial-gradient(circle at 100% 50%, transparent 4px, black 4px),
          radial-gradient(circle at 25% 0%,   transparent 4px, black 4px),
          radial-gradient(circle at 75% 0%,   transparent 4px, black 4px),
          radial-gradient(circle at 25% 100%, transparent 4px, black 4px),
          radial-gradient(circle at 75% 100%, transparent 4px, black 4px),
          radial-gradient(circle at 0%   25%, transparent 4px, black 4px),
          radial-gradient(circle at 0%   75%, transparent 4px, black 4px),
          radial-gradient(circle at 100% 25%, transparent 4px, black 4px),
          radial-gradient(circle at 100% 75%, transparent 4px, black 4px),
          linear-gradient(black, black);
        -webkit-mask-composite: destination-in;
        mask-image:
          radial-gradient(circle at 50% 0%,   transparent 4px, black 4px),
          radial-gradient(circle at 50% 100%, transparent 4px, black 4px),
          radial-gradient(circle at 0%   50%, transparent 4px, black 4px),
          radial-gradient(circle at 100% 50%, transparent 4px, black 4px),
          radial-gradient(circle at 25% 0%,   transparent 4px, black 4px),
          radial-gradient(circle at 75% 0%,   transparent 4px, black 4px),
          radial-gradient(circle at 25% 100%, transparent 4px, black 4px),
          radial-gradient(circle at 75% 100%, transparent 4px, black 4px),
          radial-gradient(circle at 0%   25%, transparent 4px, black 4px),
          radial-gradient(circle at 0%   75%, transparent 4px, black 4px),
          radial-gradient(circle at 100% 25%, transparent 4px, black 4px),
          radial-gradient(circle at 100% 75%, transparent 4px, black 4px),
          linear-gradient(black, black);
        mask-composite: intersect;
      }
      .stamp-face {
        position: absolute;
        inset: 5px;
        border: 1px solid rgba(150,120,80,0.35);
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f5ebe0, #e8d5bc);
        font-family: 'Playfair Display', serif;
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
      }
      .stamp-face-text {
        font-size: 7px;
        text-align: center;
        letter-spacing: 0.5px;
        color: var(--ink-muted);
        line-height: 1.3;
        font-family: 'Lora', serif;
      }

      /* postmark cancel overlay */
      .postmark {
        position: absolute;
        top: -4px;
        right: -8px;
        width: 46px;
        height: 46px;
        pointer-events: none;
      }
      .postmark svg {
        width: 100%;
        height: 100%;
        opacity: 0.55;
      }

      /* ── Profile section ── */

      .card-profile {
        padding: 22px 20px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-bottom: 1px solid rgba(150,120,80,0.12);
      }

      .letter-avatar {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        background: var(--accent);
        display: grid;
        place-items: center;
        margin-bottom: 11px;
        overflow: hidden;
        border: 2.5px solid var(--env-border);
        box-shadow: 0 2px 8px rgba(0,0,0,0.14);
      }
      .letter-avatar img { width: 100%; height: 100%; object-fit: cover; }
      .letter-avatar-initials {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        font-weight: 700;
        color: #fff;
      }

      .letter-name {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 5px;
      }
      .letter-bio {
        font-size: 12.5px;
        color: var(--ink-muted);
        text-align: center;
        line-height: 1.5;
      }

      /* ── Wax seal divider ── */

      .wax-seal-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 16px 20px;
      }
      .wax-rule { flex: 1; height: 1px; background: var(--env-border); opacity: 0.3; }
      .wax-seal {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        flex-shrink: 0;
        background: radial-gradient(circle at 38% 32%, #b84020, var(--seal-color));
        box-shadow:
          0 2px 6px rgba(122,44,14,0.5),
          inset 0 1px 2px rgba(255,180,100,0.25);
        display: grid;
        place-items: center;
        position: relative;
      }
      .wax-seal::before {
        content: '';
        position: absolute;
        inset: 4px;
        border-radius: 50%;
        border: 1px solid rgba(255,160,80,0.25);
      }
      .wax-seal-letter {
        font-family: 'Playfair Display', serif;
        font-size: 14px;
        font-weight: 700;
        color: rgba(255,225,170,0.92);
        position: relative;
        z-index: 1;
        text-shadow: 0 1px 2px rgba(0,0,0,0.35);
      }

      /* ── Letter body (handwriting area) ── */

      .card-body {
        padding: 6px 20px 20px 48px; /* left-heavy padding clears the margin line */
      }

      .letter-greeting {
        font-family: 'Caveat', cursive;
        font-size: 18px;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 10px;
        line-height: 1.4;
      }
      .letter-message {
        font-family: 'Caveat', cursive;
        font-size: 17px;
        line-height: 1.75;
        color: var(--ink);
        white-space: pre-wrap;
        margin-bottom: 14px;
      }
      .letter-signature {
        font-family: 'Caveat', cursive;
        font-size: 20px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 22px;
        transform: rotate(-1.5deg);
        display: inline-block;
      }

      /* ── Buttons ── */

      .card-actions {
        padding: 0 20px 20px;
        display: flex;
        flex-direction: column;
        gap: 9px;
      }

      .letter-btn {
        display: block;
        width: 100%;
        padding: 12px 18px;
        border-radius: 7px;
        font-family: 'Lora', serif;
        font-size: 13.5px;
        font-weight: 600;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.12s;
        border: none;
        letter-spacing: 0.01em;
      }
      .letter-btn:hover { opacity: 0.82; transform: translateY(-1px); }
      .letter-btn.primary { background: var(--btn-bg); color: var(--btn-text); }
      .letter-btn.ghost {
        background: transparent;
        color: var(--ink);
        border: 1.5px solid var(--env-border);
      }

      /* ── Footer ── */

      .card-footer {
        padding: 12px 20px 16px;
        border-top: 1px solid rgba(150,120,80,0.13);
        text-align: center;
        font-size: 10px;
        color: var(--ink-muted);
        opacity: 0.5;
        letter-spacing: 0.07em;
        text-transform: uppercase;
      }

      /* ── Air mail label (bottom of card) ── */

      .airmail-label {
        border-top: 3px solid;
        border-image: repeating-linear-gradient(
          90deg,
          #c0392b 0px 8px,
          #fff    8px 12px,
          #1a5fb4 12px 20px,
          #fff    20px 24px
        ) 3;
        font-size: 9px;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--ink-muted);
        text-align: center;
        padding: 5px 0 6px;
        font-family: 'Lora', serif;
        font-weight: 600;
        opacity: 0.65;
      }
    </style>
  </head>
  <body>

    <!-- ── Envelope animation stage ─────────────────────────── -->
    <div id="envStage">
      <div id="envWrap">
        <div id="envBody">
          <div id="letterPeek">
            <div class="peek-content">
              <div class="peek-name"></div>
              <div class="peek-text"></div>
              <div class="peek-text"></div>
              <div class="peek-text"></div>
              <div class="peek-air">Par Avion</div>
            </div>
          </div>
        </div>
        <div id="envFlap">
          <div id="envFlapFront"></div>
          <div id="envFlapBack"></div>
        </div>
      </div>
    </div>

    <!-- ── Letter content ─────────────────────────────────── -->
    <div id="letterPage">
      <div id="letterCard">
        <!-- rendered by JS -->
      </div>
    </div>

    <script>
      // ─── CONFIG ──────────────────────────────────────────────────
      // Edit this object to customise the letter.

      const config = {
        profile: {
          name: "Sofia Marin",
          bio: "Florist & slow-living advocate\nBased in Lisbon, Portugal",
          avatarInitials: "SM",
          avatarImage: "",          // set to image URL to use a photo
        },

        letter: {
          greeting: "Hello, lovely,",
          message:
            "Thank you for stopping by my little corner of the internet.\n\n" +
            "I'd love to connect — whether it's about flowers, commissions, " +
            "or just a gentle hello.",
          signature: "With warmth, Sofia ✶",
        },

        // Add, remove, or reorder buttons freely.
        // style: "primary" (filled) | "ghost" (outlined)
        buttons: [
          { label: "Book a Floral Arrangement", url: "#", style: "primary" },
          { label: "Browse My Portfolio",        url: "#", style: "ghost"   },
          { label: "Send Me a Message",          url: "#", style: "ghost"   },
        ],

        appearance: {
          envBg:      "#ede3d4",
          envBorder:  "#c8b49a",
          envShade:   "#d4c4ae",
          paperBg:    "#fefcf5",
          stageBg:    "#ddd0be",
          ink:        "#1e1710",
          inkMuted:   "#7a6855",
          accent:     "#8c6e4b",
          sealColor:  "#7a2c0e",
          btnBg:      "#1e1710",
          btnText:    "#fefcf5",
        },
      };

      // ─── END CONFIG ──────────────────────────────────────────────

      // Apply CSS vars from config
      (function () {
        const s = document.documentElement.style;
        const a = config.appearance;
        s.setProperty("--env-bg",     a.envBg);
        s.setProperty("--env-border", a.envBorder);
        s.setProperty("--env-shade",  a.envShade);
        s.setProperty("--paper-bg",   a.paperBg);
        s.setProperty("--stage-bg",   a.stageBg);
        s.setProperty("--ink",        a.ink);
        s.setProperty("--ink-muted",  a.inkMuted);
        s.setProperty("--accent",     a.accent);
        s.setProperty("--seal-color", a.sealColor);
        s.setProperty("--btn-bg",     a.btnBg);
        s.setProperty("--btn-text",   a.btnText);
      })();

      function formatDate() {
        return new Date().toLocaleDateString("en-GB", {
          day: "numeric", month: "long", year: "numeric",
        });
      }

      function renderCard() {
        const { profile, letter, buttons } = config;

        const avatarHTML = profile.avatarImage
          ? `<img src="${profile.avatarImage}" alt="${profile.name}" />`
          : `<span class="letter-avatar-initials">${
              profile.avatarInitials ||
              profile.name.trim().slice(0, 2).toUpperCase()
            }</span>`;

        const buttonsHTML = buttons
          .map((b) => `<a class="letter-btn ${b.style}" href="${b.url}">${b.label}</a>`)
          .join("");

        const slug = profile.name.trim().replace(/\s+/g, "-").toUpperCase();

        // Postmark SVG — circle with cancel lines
        const postmarkSVG = `
          <svg viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="23" cy="23" r="20" stroke="#1a1a1a" stroke-width="1.5"/>
            <circle cx="23" cy="23" r="14" stroke="#1a1a1a" stroke-width="0.75" stroke-dasharray="2 2"/>
            <text x="23" y="20" text-anchor="middle" font-size="5" font-family="serif" fill="#1a1a1a" letter-spacing="1">WEMINT</text>
            <text x="23" y="28" text-anchor="middle" font-size="5.5" font-family="serif" fill="#1a1a1a" letter-spacing="0.5">LINK</text>
            <line x1="3" y1="22" x2="43" y2="24" stroke="#1a1a1a" stroke-width="1.2"/>
            <line x1="3" y1="26" x2="43" y2="28" stroke="#1a1a1a" stroke-width="1.2"/>
          </svg>
        `;

        document.getElementById("letterCard").innerHTML = `
          <div class="airmail-label">Air Mail · Par Avion</div>

          <div class="card-header">
            <div class="addr-block">
              <div class="addr-label">From</div>
              <div class="addr-name">${profile.name}</div>
              <div class="addr-bio">${profile.bio.replace(/\n/g, "<br>")}</div>
              <div class="addr-date">${formatDate()}</div>
            </div>
            <div class="stamp-block">
              <div class="stamp">
                <div class="stamp-face">
                  <div>
                    <div style="font-size:12px;font-weight:700;font-family:'Playfair Display',serif;color:var(--accent)">W</div>
                    <div class="stamp-face-text">WEMINT<br>LINK</div>
                  </div>
                </div>
              </div>
              <div class="postmark">${postmarkSVG}</div>
            </div>
          </div>

          <div class="card-profile">
            <div class="letter-avatar">${avatarHTML}</div>
            <div class="letter-name">${profile.name}</div>
            <div class="letter-bio">${profile.bio.replace(/\n/g, "<br>")}</div>
          </div>

          <div class="wax-seal-wrap">
            <div class="wax-rule"></div>
            <div class="wax-seal"><span class="wax-seal-letter">W</span></div>
            <div class="wax-rule"></div>
          </div>

          <div class="card-body">
            <p class="letter-greeting">${letter.greeting}</p>
            <p class="letter-message">${letter.message}</p>
            <p class="letter-signature">${letter.signature}</p>
          </div>

          <div class="card-actions">${buttonsHTML}</div>

          <div class="card-footer">WEMINT.LINK/${slug} &nbsp;·&nbsp; &gt;_ MAKE YOURS</div>
        `;
      }

      function runAnimation() {
        const flap  = document.getElementById("envFlap");
        const peek  = document.getElementById("letterPeek");
        const stage = document.getElementById("envStage");
        const page  = document.getElementById("letterPage");

        setTimeout(() => flap.classList.add("open"),   600);
        setTimeout(() => peek.classList.add("reveal"), 1200);
        setTimeout(() => {
          stage.classList.add("hide");
          page.classList.add("show");
          document.body.style.overflowY = "auto";
        }, 2200);
      }

      renderCard();
      runAnimation();
    </script>
  </body>
</html>
