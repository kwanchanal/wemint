<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>We Mint</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700;800&display=swap" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="topbar__spacer"></div>
        <a href="mintcoin.html" class="topbar__link text-mint-yours reveal delay-1"><span class="wiggle-target">MINT YOURS ✨</span></a>
        <a href="#" class="topbar__link topbar__link--bold text-login reveal delay-2"><span class="wiggle-target">LOGIN</span></a>
      </header>

      <main class="hero">
        <div class="hero__text">
          <div class="brand">
            <span class="text-we reveal delay-3">WE</span>
            <span class="brand__heart text-heart reveal delay-4 heart-blink">
              <img class="heart-img" src="assets/shape/heart.png" alt="heart" />
            </span>
            <span class="text-mint reveal delay-5">MINT</span>
          </div>
          <h1 class="text-hello reveal delay-6"><span class="wiggle-target">สวัสดีค่ะ</span></h1>
          <p class="hero__subtitle text-subtitle reveal delay-7">WE MINT DELIGHTFUL THINGS HERE</p>
        </div>

        <div class="hero__art">
          <div class="stage">
            <div class="asset asset--jar reveal delay-8">
              <img src="assets/jar.png" alt="Jar with coins" />
            </div>
            <div class="asset asset--coin1 reveal delay-9">
              <img src="assets/coin1.png" alt="coin1" />
            </div>
            <div class="asset asset--coin2 reveal delay-10">
              <img src="assets/coin2.png" alt="coin2" />
            </div>
            <div class="asset asset--coin3 reveal delay-11">
              <img src="assets/coin3.png" alt="coin3" />
            </div>
            <div class="asset asset--coin4 reveal delay-12">
              <img src="assets/coin4.png" alt="coin4" />
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
