<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wemint.link</title>
    <link rel="icon" type="image/png" href="asset/favicon/home.png" />
    <!-- Google Sans is not available on Google Fonts; use local installed font with fallbacks. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_forward,dehaze"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="noise"></div>
    <div class="globe-bg" aria-hidden="true">
      <canvas class="globe-canvas"></canvas>
    </div>

    <header class="nav">
      <div class="nav__pill">
        <div class="nav__links nav__links--left">
          <a href="#main">Main</a>
          <a href="#about">About Us</a>
          <a href="#blog">Blog</a>
        </div>
        <div class="nav__links nav__links--right">
          <a class="nav__cta apple-btn" href="https://wemint.link/checkout">Make Your Link</a>
        </div>
        <button
          class="nav__toggle"
          type="button"
          aria-label="Open menu"
          aria-expanded="false"
          aria-controls="navDrawer"
          aria-haspopup="menu"
        >
          <span class="material-symbols-outlined" aria-hidden="true">dehaze</span>
        </button>
        <div class="nav__drawer" id="navDrawer" aria-label="Primary">
          <a href="#main">Main</a>
          <a href="#about">About Us</a>
          <a href="#blog">Blog</a>
          <a href="#login">Log-in</a>
        </div>
      </div>
    </header>

    <main>
      <section class="hero" id="main">
        <div class="hero__orbit">
          <img class="orbit__avatar a1" src="asset/circle-1.png" alt="" />
          <img class="orbit__avatar a2" src="asset/circle-2.png" alt="" />
          <img class="orbit__avatar a3" src="asset/circle-3.png" alt="" />
          <img class="orbit__avatar a4" src="asset/circle-4.png" alt="" />
          <img class="orbit__avatar a5" src="asset/circle-5.png" alt="" />
          <img class="orbit__avatar a6" src="asset/circle-6.png" alt="" />

          <div class="hero__content">
            <p class="hero__brand">
              wemint.link/
              <span class="you-pill"><span class="you-word" id="youWord">YOU</span></span>
            </p>
            <a class="btn primary btn-hero apple-btn" href="https://wemint.link/checkout">Make Your Link</a>
          </div>
        </div>
      </section>

      <section class="message" id="about">
        <h2>
          We Help <span class="globe"><img src="asset/rotating-globe.gif" alt="Globe" /></span>
          You Link<br />
          From Anywhere Just Being Who You Are
        </h2>
        <div class="message__stack" aria-label="Message previews">
          <div class="message__track">
            <img src="asset/message1.png" alt="Message preview one" />
            <img src="asset/message2.png" alt="Message preview two" />
            <img src="asset/message3.png" alt="Message preview three" />
            <img src="asset/message4.png" alt="Message preview four" />
            <img src="asset/message5.png" alt="Message preview five" />
            <img src="asset/message6.png" alt="Message preview six" />
            <img src="asset/message1.png" alt="" aria-hidden="true" />
            <img src="asset/message2.png" alt="" aria-hidden="true" />
            <img src="asset/message3.png" alt="" aria-hidden="true" />
            <img src="asset/message4.png" alt="" aria-hidden="true" />
            <img src="asset/message5.png" alt="" aria-hidden="true" />
            <img src="asset/message6.png" alt="" aria-hidden="true" />
          </div>
        </div>
        <a class="btn dark apple-btn btn-hero" href="https://wemint.link/checkout">Make Your Link</a>
      </section>

      <section class="link-types" id="blog">
        <div class="link-grid">
          <a class="link-card apple-card" href="#" aria-label="Open Profile Link">
            <div class="link-card__head">
              <h3>Profile Link</h3>
              <span class="link-card__arrow material-symbols-outlined">arrow_forward</span>
            </div>
            <img src="asset/card1.png" alt="Profile link preview" />
          </a>
          <a class="link-card apple-card" href="#" aria-label="Open Payment Link">
            <div class="link-card__head">
              <h3>Payment Link</h3>
              <span class="link-card__arrow material-symbols-outlined">arrow_forward</span>
            </div>
            <img src="asset/card2.png" alt="Payment link preview" />
          </a>
          <a class="link-card apple-card" href="#" aria-label="Open Interactive Link">
            <div class="link-card__head">
              <h3>Interactive Link</h3>
              <span class="link-card__arrow material-symbols-outlined">arrow_forward</span>
            </div>
            <img src="asset/card3.png" alt="Interactive link preview" />
          </a>
        </div>
        <div class="marquee-stack" aria-label="Icon and bag belt">
          <div class="icon-marquee" aria-label="Icon gallery">
            <div class="icon-marquee-inner">
              <div class="icon-track">
                <img src="asset/icon1.png" alt="" />
                <img src="asset/icon2.png" alt="" />
                <img src="asset/icon3.png" alt="" />
                <img src="asset/icon4.png" alt="" />
              </div>
              <div class="icon-track" aria-hidden="true">
                <img src="asset/icon1.png" alt="" />
                <img src="asset/icon2.png" alt="" />
                <img src="asset/icon3.png" alt="" />
                <img src="asset/icon4.png" alt="" />
              </div>
            </div>
          </div>
          <div class="bag-marquee" aria-label="Bag belt">
            <div class="bag-boxes">
              <div class="bag-row">
                <img src="asset/box1.png" alt="" />
                <img src="asset/box2.png" alt="" />
                <img src="asset/box3.png" alt="" />
                <img src="asset/box4.png" alt="" />
                <img src="asset/box5.png" alt="" />
                <img src="asset/box6.png" alt="" />
              </div>
              <div class="bag-row" aria-hidden="true">
                <img src="asset/box1.png" alt="" />
                <img src="asset/box2.png" alt="" />
                <img src="asset/box3.png" alt="" />
                <img src="asset/box4.png" alt="" />
                <img src="asset/box5.png" alt="" />
                <img src="asset/box6.png" alt="" />
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="pricing" aria-label="Our Pricing">
        <div class="pricing__title">
          <img src="asset/ourpricing.png" alt="Our Pricing" />
        </div>
        <div class="pricing__grid">
          <div class="price-card">
            <img src="asset/price1.png" alt="Free plan" />
            <img class="price-card__sticker" src="asset/sticker1.png" alt="" />
          </div>
          <div class="price-card">
            <img src="asset/price2.png" alt="Starter plan" />
          </div>
          <div class="price-card">
            <img src="asset/price3.png" alt="Business plan" />
            <img class="price-card__sticker right" src="asset/sticker2.png" alt="" />
          </div>
        </div>
      </section>

      <section class="contact">
        <h2>More?</h2>
        <div class="contact__bar">
          <span class="contact__text" id="contactText" aria-live="polite">Tell us how we can help you</span>
          <button class="contact__go" type="button" aria-label="Send">
            <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
          </button>
        </div>
      </section>
    </main>
